<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo Web SZ</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="img/logosz.png" alt="Logo" class="logo">
                <span class="ms-2">SZ Distribuciones</span>
            </a>

            <!-- BOTON CARRITO -->
            <button class="btn btn-warning position-relative" data-bs-toggle="offcanvas"
                data-bs-target="#carritoCanvas">

                🛒 Carrito

                <span id="contador-carrito"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    0
                </span>

            </button>

        </div>
    </nav>

    <!-- CARRUSEL -->
    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="img/2.png" class="d-block w-100 carousel-img" alt="">
            </div>

            <div class="carousel-item">
                <img src="img/3.png" class="d-block w-100 carousel-img" alt="">
            </div>

            <div class="carousel-item">
                <img src="img/sauce.png" class="d-block w-100 carousel-img" alt="">
            </div>

            <div class="carousel-item">
                <img src="img/bernardi.png" class="d-block w-100 carousel-img" alt="">
            </div>

            <div class="carousel-item">
                <img src="img/cerrito.png" class="d-block w-100 carousel-img" alt="">
            </div>

            <div class="carousel-item">
                <img src="img/hernadarias.png" class="d-block w-100 carousel-img" alt="">
            </div>

            <div class="carousel-item">
                <img src="img/piedrasblancas.png" class="d-block w-100 carousel-img" alt="">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

    <!-- PRODUCTOS -->
    
    <div class="container py-5">
    
<!-- SECCION PASTAS -->
        <!-- PRODUCTOS -->
        <div class="container py-5" id="contenedor-productos">
        </div>
    
<!-- SECCION LACTEOS -->
        <!-- PRODUCTOS -->
        <div class="container py-5" id="contenedor-productos">
        </div>

<!-- SECCION FIAMBRES -->
        <!-- PRODUCTOS -->
        <div class="container py-5" id="contenedor-productos">
        </div>
    </div>

   <!-- CARRITO -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="carritoCanvas">

    <div class="offcanvas-header">

      <h5>🛒 Mi carrito</h5>

      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>

    </div>

    <div class="offcanvas-body">

      <ul id="lista-carrito" class="list-group mb-3"></ul>

      <h4>Total: $<span id="total">0</span></h4>

      <button class="btn btn-success w-100 mt-3" onclick="enviarWhatsApp()">
        Enviar pedido por WhatsApp
      </button>

    </div>

  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center py-3">
    © 2026 Distribuidora SZ
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
